<!doctype html>
<html lang="hu" data-mode="minimal">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pinocchio Pizzéria · Baja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
/* ────────────────────────────────────────────────────────────────
   Pinocchio Pizzéria — letisztult minimál
   Color modes via [data-mode] on <html>
───────────────────────────────────────────────────────────────── */

:root {
  --bg: #f7f3ea;
  --bg-2: #ffffff;
  --fg: #1a1815;
  --fg-soft: #4a463f;
  --fg-mute: #8a857c;
  --line: #d9d1bf;
  --line-soft: #ece4d3;
  --accent: #c8362a;     /* tomato */
  --accent-ink: #ffffff;

  --display: "DM Serif Display", "Cormorant Garamond", Georgia, serif;
  --body: "Manrope", "Söhne", system-ui, -apple-system, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;

  --maxw: 1280px;
  --gutter: clamp(20px, 4vw, 56px);
}

html[data-mode="editorial"] {
  --bg: #efe7d4;
  --bg-2: #f7f0dd;
  --fg: #1a1815;
  --fg-soft: #3b362c;
  --fg-mute: #756f60;
  --line: #c9bd9e;
  --line-soft: #d7cdb1;
}

html[data-mode="bold"] {
  --bg: #16140f;
  --bg-2: #1f1c16;
  --fg: #f5efe4;
  --fg-soft: #ddd5c4;
  --fg-mute: #9c9685;
  --line: #2e2a22;
  --line-soft: #25221c;
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { background: var(--bg); color: var(--fg); }
body {
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img, svg { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
h1, h2, h3, h4 { margin: 0; font-weight: 400; }
p { margin: 0; }

/* ── Type ───────────────────────────────────────────────────── */
.display { font-family: var(--display); font-weight: 400; line-height: 1.02; letter-spacing: -0.01em; }
.serif { font-family: var(--display); }
.mono { font-family: var(--mono); font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; }
.eyebrow {
  font-family: var(--body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--fg-mute);
}

/* ── Layout ─────────────────────────────────────────────────── */
.container {
  max-width: var(--maxw);
  margin: 0 auto;
  padding-left: var(--gutter);
  padding-right: var(--gutter);
}

.app {
  min-height: 100vh;
  background: var(--bg);
  color: var(--fg);
}

/* ── Nav ────────────────────────────────────────────────────── */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in oklab, var(--bg) 88%, transparent);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid var(--line-soft);
}
.nav-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  height: 76px;
  gap: 24px;
}
.nav-brand {
  font-family: var(--display);
  font-size: 26px;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-brand .flag {
  display: inline-grid;
  grid-template-columns: 1fr 1fr 1fr;
  width: 22px;
  height: 14px;
  overflow: hidden;
  border-radius: 2px;
  border: 1px solid var(--line);
}
.nav-brand .flag span:nth-child(1){ background:#0a7a3a;}
.nav-brand .flag span:nth-child(2){ background: var(--bg-2);}
.nav-brand .flag span:nth-child(3){ background: var(--accent);}

.nav-links {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
}
.nav-link {
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 14px;
  color: var(--fg-soft);
  transition: color .15s ease, background .15s ease;
}
.nav-link:hover { color: var(--fg); }
.nav-link.active {
  color: var(--fg);
  background: color-mix(in oklab, var(--fg) 8%, transparent);
}
html[data-mode="bold"] .nav-link.active { background: color-mix(in oklab, var(--fg) 14%, transparent); }

.nav-phone {
  justify-self: end;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .04em;
  color: var(--fg-soft);
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-phone .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #2aa754;
  box-shadow: 0 0 0 3px color-mix(in oklab, #2aa754 25%, transparent);
}

/* ── EU / Széchenyi Terv Plusz funding badge ───────────────── */
.funding-badge {
  position: fixed;
  top: 92px;
  left: 16px;
  z-index: 60;
  display: block;
  width: clamp(180px, 18vw, 240px);
  background: #ffffff;
  border: 1px solid rgba(0,0,0,.08);
  border-radius: 6px;
  padding: 8px 10px;
  box-shadow: 0 6px 24px rgba(0,0,0,.18), 0 1px 0 rgba(0,0,0,.05);
  transition: transform .15s ease, box-shadow .15s ease;
}
.funding-badge:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 32px rgba(0,0,0,.22), 0 1px 0 rgba(0,0,0,.05);
}
.funding-badge img {
  display: block;
  width: 100%;
  height: auto;
}
@media (max-width: 880px) {
  .funding-badge {
    top: auto;
    bottom: 12px;
    left: 12px;
    width: 150px;
    padding: 6px 8px;
  }
}

/* ── Hero ───────────────────────────────────────────────────── */
.hero {
  position: relative;
  min-height: clamp(560px, 78vh, 820px);
  display: grid;
  align-items: end;
  overflow: hidden;
}

/* Photo hero — image-led, the image carries its own brand title */
.hero-photo {
  min-height: clamp(640px, 92vh, 940px);
  background: #1a1410;
}
.hero-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 35%;
  z-index: 1;
}
.hero-vignette {
  position: absolute;
  inset: 0;
  z-index: 2;
  background:
    linear-gradient(180deg, rgba(0,0,0,.45) 0%, rgba(0,0,0,.2) 35%, rgba(0,0,0,.0) 55%, rgba(0,0,0,.65) 100%),
    linear-gradient(90deg, rgba(0,0,0,.35) 0%, rgba(0,0,0,0) 50%);
  pointer-events: none;
}
.hero-photo .hero-content { z-index: 3; }
.hero-cta-bar {
  position: relative;
  z-index: 3;
  width: 100%;
  padding: 0 0 clamp(28px, 4vw, 48px);
}
.hero-cta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.hero-eyebrow-mini {
  color: rgba(255,255,255,.88);
  font-family: var(--body);
  font-size: 12.5px;
  letter-spacing: .14em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: rgba(0,0,0,.35);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.12);
}
.hero-eyebrow-mini .bar {
  width: 22px; height: 1px; background: rgba(255,255,255,.7);
  display: inline-block;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #2a261d 0%, #4a4034 60%, #6a5c4a 100%);
  overflow: hidden;
}
.hero-bg::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 30% 40%, rgba(200, 54, 42, 0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 60%, rgba(255, 200, 100, 0.25) 0%, transparent 55%),
    repeating-linear-gradient(45deg, rgba(0,0,0,0.06) 0 2px, transparent 2px 7px);
}
.hero-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.2) 0%, rgba(0,0,0,.0) 30%, rgba(0,0,0,.55) 100%);
}
.hero-placeholder-label {
  position: absolute;
  left: 24px;
  top: 24px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: rgba(255,255,255,.55);
  background: rgba(0,0,0,.25);
  padding: 6px 10px;
  border-radius: 4px;
  z-index: 2;
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 0 var(--gutter) clamp(48px, 8vh, 96px);
  color: #fff;
  width: 100%;
  max-width: var(--maxw);
  margin: 0 auto;
}
.hero-eyebrow {
  font-family: var(--body);
  font-size: 11px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: rgba(255,255,255,.78);
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.hero-eyebrow .bar {
  display: inline-block;
  width: 38px;
  height: 1px;
  background: rgba(255,255,255,.6);
}
.hero-title {
  font-family: var(--display);
  font-size: clamp(56px, 9vw, 132px);
  line-height: .92;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
  max-width: 14ch;
}
.hero-title em {
  font-style: italic;
  color: color-mix(in oklab, #fff 70%, var(--accent));
}
.hero-sub {
  max-width: 46ch;
  font-size: clamp(16px, 1.4vw, 19px);
  color: rgba(255,255,255,.86);
  line-height: 1.5;
  margin-bottom: 36px;
}
.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}

/* ── Buttons ────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  border-radius: 999px;
  border: 1px solid transparent;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .02em;
  transition: transform .15s ease, background .15s ease, color .15s ease, border-color .15s ease;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--accent); color: var(--accent-ink); }
.btn-primary:hover { background: color-mix(in oklab, var(--accent) 88%, #000); }
.btn-ghost-light { background: transparent; color: #fff; border-color: rgba(255,255,255,.4); }
.btn-ghost-light:hover { background: rgba(255,255,255,.1); }
.btn-ghost { background: transparent; color: var(--fg); border-color: var(--line); }
.btn-ghost:hover { border-color: var(--fg); }
.btn-dark { background: var(--fg); color: var(--bg); }
.btn-dark:hover { background: color-mix(in oklab, var(--fg) 90%, var(--accent)); }

/* ── Sections ───────────────────────────────────────────────── */
.section { padding: clamp(64px, 10vw, 128px) 0; }
.section-tight { padding: clamp(40px, 6vw, 80px) 0; }
.section-title {
  font-family: var(--display);
  font-size: clamp(40px, 5vw, 72px);
  line-height: 1.02;
  letter-spacing: -0.015em;
  max-width: 18ch;
}
.section-head {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 32px;
  margin-bottom: 56px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 28px;
}
.section-head .eyebrow { margin-bottom: 14px; }

/* ── Hours strip ────────────────────────────────────────────── */
.hours-strip {
  background: var(--bg-2);
  border-top: 1px solid var(--line-soft);
  border-bottom: 1px solid var(--line-soft);
}
html[data-mode="bold"] .hours-strip { background: var(--bg-2); }
.hours-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 36px;
  padding: 28px 0;
}
.hours-days {
  display: flex;
  gap: clamp(16px, 3vw, 38px);
  flex-wrap: wrap;
}
.hours-day {
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .1em;
  color: var(--fg-mute);
}
.hours-day b {
  font-family: var(--display);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: 0;
  color: var(--fg);
  text-transform: none;
}
.hours-day.today b { color: var(--accent); }
.hours-status {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-mute);
  letter-spacing: .12em;
}
.hours-status .live {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #2aa754;
  font-weight: 600;
}
.hours-status .live::before {
  content: "";
  width: 8px; height: 8px; border-radius: 50%;
  background: #2aa754;
  box-shadow: 0 0 0 3px color-mix(in oklab, #2aa754 25%, transparent);
}

/* ── Featured pizzas ────────────────────────────────────────── */
.featured-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(20px, 2vw, 36px);
}
.feat-card {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.feat-img {
  aspect-ratio: 4 / 5;
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  position: relative;
  overflow: hidden;
}
.feat-img .label {
  position: absolute;
  left: 14px; top: 14px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .16em;
  color: var(--fg-mute);
  background: var(--bg);
  padding: 4px 8px;
  border-radius: 2px;
  z-index: 2;
}
.feat-img .num {
  position: absolute;
  right: 18px;
  bottom: 14px;
  font-family: var(--display);
  font-size: 64px;
  color: color-mix(in oklab, var(--fg) 14%, transparent);
  line-height: 1;
  z-index: 2;
}
.feat-img-stripe {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(45deg,
    color-mix(in oklab, var(--fg) 4%, transparent) 0 1px,
    transparent 1px 11px);
}
.feat-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--line-soft);
  padding-bottom: 12px;
}
.feat-name {
  font-family: var(--display);
  font-size: 26px;
  line-height: 1;
}
.feat-price {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--fg-soft);
}
.feat-desc {
  color: var(--fg-mute);
  font-size: 14.5px;
  line-height: 1.5;
}

/* ── Two-col promo ──────────────────────────────────────────── */
.two-col {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: clamp(40px, 6vw, 96px);
  align-items: center;
}
.two-col-img {
  aspect-ratio: 4 / 5;
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  position: relative;
  overflow: hidden;
}

/* ── Reviews ────────────────────────────────────────────────── */
.reviews-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}
.review {
  border: 1px solid var(--line-soft);
  padding: 32px 28px;
  background: var(--bg-2);
  display: flex;
  flex-direction: column;
  gap: 20px;
  border-radius: 4px;
}
.review-stars {
  color: var(--accent);
  letter-spacing: 3px;
  font-size: 16px;
}
.review-quote {
  font-family: var(--display);
  font-size: 22px;
  line-height: 1.25;
  color: var(--fg);
}
.review-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: auto;
}
.review-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: color-mix(in oklab, var(--accent) 18%, var(--bg-2));
  display: grid; place-items: center;
  font-family: var(--display);
  font-size: 16px;
  color: var(--accent);
}
.review-meta b { font-weight: 600; font-size: 14px; }
.review-meta span { font-size: 12px; color: var(--fg-mute); }

/* ── Menu page ──────────────────────────────────────────────── */
.menu-header {
  padding-top: clamp(72px, 10vw, 128px);
  padding-bottom: clamp(48px, 6vw, 80px);
  border-bottom: 1px solid var(--line);
}
.menu-title {
  font-family: var(--display);
  font-size: clamp(72px, 10vw, 180px);
  line-height: .9;
  letter-spacing: -0.025em;
  margin-bottom: 24px;
}
.menu-intro {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: end;
}
.menu-controls {
  display: flex;
  gap: 12px;
  margin-top: 36px;
  margin-bottom: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.menu-search {
  flex: 1;
  min-width: 240px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--bg-2);
}
.menu-search input {
  flex: 1;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--fg);
  font: inherit;
  font-size: 14px;
}
.menu-search input::placeholder { color: var(--fg-mute); }
.menu-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 16px 0 24px;
  border-bottom: 1px solid var(--line-soft);
}
.menu-tab {
  background: transparent;
  border: 1px solid var(--line);
  padding: 8px 16px;
  border-radius: 999px;
  font-size: 13px;
  color: var(--fg-soft);
}
.menu-tab.active {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}

.menu-section { padding: clamp(48px, 6vw, 88px) 0; border-bottom: 1px solid var(--line-soft); }
.menu-section:last-of-type { border-bottom: 0; }
.menu-section-head {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 48px;
  margin-bottom: 40px;
  align-items: start;
}
.menu-section-title {
  font-family: var(--display);
  font-size: 44px;
  line-height: 1;
  letter-spacing: -.01em;
}
.menu-section-note {
  font-size: 14px;
  color: var(--fg-mute);
  max-width: 60ch;
  line-height: 1.6;
}

.menu-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 64px;
}
@media (max-width: 880px) { .menu-list { grid-template-columns: 1fr; } }

.menu-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  padding: 18px 0;
  border-bottom: 1px dashed var(--line-soft);
  align-items: baseline;
}
.menu-item-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-mute);
  min-width: 22px;
}
.menu-item-body { display: flex; flex-direction: column; gap: 4px; }
.menu-item-name {
  font-family: var(--display);
  font-size: 20px;
  letter-spacing: -.005em;
}
.menu-item-desc {
  font-size: 13.5px;
  color: var(--fg-mute);
  line-height: 1.45;
}
.menu-item-price {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--fg);
  white-space: nowrap;
}
.menu-empty {
  padding: 80px 0;
  text-align: center;
  color: var(--fg-mute);
  font-size: 14px;
}

.menu-foot {
  padding: 40px 0 0;
  font-size: 12.5px;
  color: var(--fg-mute);
  line-height: 1.7;
  border-top: 1px solid var(--line-soft);
  margin-top: 24px;
}

/* ── Gallery ────────────────────────────────────────────────── */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 120px;
  gap: 14px;
}
.tile {
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  position: relative;
  overflow: hidden;
  transition: transform .25s ease;
}
.tile:hover { transform: scale(1.01); }
.tile .label {
  position: absolute;
  left: 14px; top: 14px;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .14em;
  color: var(--fg-mute);
  z-index: 2;
}
.tile .caption {
  position: absolute;
  left: 16px; right: 16px; bottom: 14px;
  font-family: var(--display);
  font-size: 18px;
  color: var(--fg);
  z-index: 2;
}
.tile-stripe {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(45deg,
    color-mix(in oklab, var(--fg) 4%, transparent) 0 1px,
    transparent 1px 11px);
}
.tile-warm  { background: linear-gradient(160deg, #d4a273 0%, #a06a3a 100%); }
.tile-dark  { background: linear-gradient(160deg, #2a261d 0%, #4a4034 100%); }
.tile-red   { background: linear-gradient(160deg, #d8493b 0%, #8c2117 100%); }
.tile-cream { background: linear-gradient(160deg, #f3eadb 0%, #d9cdb0 100%); }
.tile-warm .label, .tile-warm .caption,
.tile-dark .label, .tile-dark .caption,
.tile-red  .label, .tile-red  .caption { color: rgba(255,255,255,.92); }

/* sizes */
.s-2x2 { grid-column: span 2; grid-row: span 2; }
.s-2x1 { grid-column: span 2; grid-row: span 1; }
.s-3x2 { grid-column: span 3; grid-row: span 2; }
.s-1x2 { grid-column: span 1; grid-row: span 2; }
.s-3x1 { grid-column: span 3; grid-row: span 1; }
.s-4x2 { grid-column: span 4; grid-row: span 2; }

/* ── About ──────────────────────────────────────────────────── */
.about-hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  align-items: end;
  padding-top: clamp(64px, 8vw, 120px);
  padding-bottom: clamp(40px, 6vw, 80px);
}
.about-hero h1 {
  font-family: var(--display);
  font-size: clamp(64px, 9vw, 156px);
  line-height: .9;
  letter-spacing: -.025em;
}
.about-hero p {
  font-family: var(--display);
  font-style: italic;
  font-size: clamp(20px, 2vw, 28px);
  line-height: 1.3;
  color: var(--fg-soft);
  max-width: 30ch;
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  gap: clamp(40px, 6vw, 96px);
  padding-top: clamp(40px, 6vw, 80px);
  padding-bottom: clamp(40px, 6vw, 80px);
  align-items: start;
}
.about-stack {
  display: flex;
  flex-direction: column;
  gap: 22px;
  font-size: 16.5px;
  color: var(--fg-soft);
  line-height: 1.65;
}
.about-stack h3 {
  font-family: var(--display);
  font-size: 28px;
  color: var(--fg);
  line-height: 1.1;
  margin-bottom: -6px;
}
.about-img {
  aspect-ratio: 3 / 4;
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  position: relative;
  overflow: hidden;
  position: sticky;
  top: 96px;
}

.pillars {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 36px;
  padding: clamp(40px, 6vw, 80px) 0;
  border-top: 1px solid var(--line);
}
.pillar { display: flex; flex-direction: column; gap: 10px; }
.pillar .num {
  font-family: var(--display);
  font-size: 56px;
  line-height: 1;
  color: var(--accent);
}
.pillar h4 {
  font-family: var(--display);
  font-size: 24px;
}
.pillar p { color: var(--fg-mute); font-size: 14.5px; line-height: 1.55; }

/* ── Contact ────────────────────────────────────────────────── */
.contact-grid {
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: clamp(40px, 6vw, 96px);
  padding: clamp(64px, 8vw, 128px) 0 clamp(40px, 6vw, 80px);
}
.contact-info { display: flex; flex-direction: column; gap: 36px; }
.contact-block {
  border-top: 1px solid var(--line);
  padding-top: 18px;
}
.contact-block .eyebrow { margin-bottom: 6px; }
.contact-block .val {
  font-family: var(--display);
  font-size: 26px;
  line-height: 1.15;
}
.contact-block a:hover { color: var(--accent); }

.form { display: flex; flex-direction: column; gap: 18px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .16em;
  color: var(--fg-mute);
}
.field input, .field textarea, .field select {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 14px 14px;
  font: inherit;
  font-size: 14px;
  color: var(--fg);
  outline: none;
  transition: border .15s ease;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--fg); }
.field textarea { resize: vertical; min-height: 120px; }
.form-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.form-note { font-size: 12px; color: var(--fg-mute); }

.map {
  margin-top: 32px;
  height: 360px;
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  position: relative;
  overflow: hidden;
}
.map-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 32px 32px;
  opacity: .7;
}
.map-river {
  position: absolute;
  left: -10%;
  top: 30%;
  width: 130%;
  height: 80px;
  background: color-mix(in oklab, var(--accent) 8%, var(--bg-2));
  transform: rotate(-7deg);
  border-top: 1px solid color-mix(in oklab, var(--accent) 30%, var(--line));
  border-bottom: 1px solid color-mix(in oklab, var(--accent) 30%, var(--line));
}
.map-pin {
  position: absolute;
  left: 50%; top: 52%;
  transform: translate(-50%, -100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 2;
}
.map-pin .pin {
  width: 18px; height: 18px; border-radius: 50% 50% 50% 0;
  background: var(--accent);
  transform: rotate(-45deg);
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}
.map-pin .pin::after {
  content: ""; position: absolute;
  left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 6px; height: 6px; border-radius: 50%; background: var(--bg-2);
}
.map-pin .lbl {
  margin-top: 14px;
  font-family: var(--mono);
  font-size: 11px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 5px 10px;
  border-radius: 4px;
  white-space: nowrap;
}

/* ── Footer ─────────────────────────────────────────────────── */
.footer {
  background: var(--bg-2);
  border-top: 1px solid var(--line);
  padding: 64px 0 28px;
  margin-top: 64px;
}
html[data-mode="bold"] .footer { background: #0e0c08; }
.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 40px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--line-soft);
}
.footer h5 {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .16em;
  color: var(--fg-mute);
  font-weight: 600;
  margin-bottom: 16px;
}
.footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
.footer li a:hover { color: var(--accent); }
.footer-tagline {
  font-family: var(--display);
  font-size: 36px;
  line-height: 1.1;
  letter-spacing: -.01em;
  margin-top: 14px;
  max-width: 14ch;
}
.footer-bottom {
  display: flex;
  justify-content: space-between;
  padding-top: 24px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-mute);
  letter-spacing: .06em;
}

/* ── Page transitions ───────────────────────────────────────── */
.page { animation: fadeIn .35s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 980px) {
  .nav-row { grid-template-columns: auto 1fr auto; }
  .nav-links { display: none; }
  .featured-grid { grid-template-columns: 1fr 1fr; }
  .reviews-grid { grid-template-columns: 1fr; }
  .two-col { grid-template-columns: 1fr; }
  .about-hero, .about-grid, .contact-grid, .menu-intro, .menu-section-head { grid-template-columns: 1fr; gap: 24px; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .gallery-grid { grid-template-columns: repeat(4, 1fr); }
  .pillars { grid-template-columns: 1fr; }
  .hours-row { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .featured-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  .footer-grid { grid-template-columns: 1fr; }
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

/* ─── Tweaks defaults ─────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "minimal",
  "accent": "#c8362a",
  "showReviews": true,
  "scale": 100
} /*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = useState(() => {
    const h = (location.hash || "").replace("#/", "").replace("#", "");
    const valid = ["home", "menu", "gallery", "about", "contact", "funding"];
    return valid.includes(h) ? h : "home";
  });

  // Apply mode + accent to <html>
  useEffect(() => {
    document.documentElement.dataset.mode = t.mode || "minimal";
    document.documentElement.style.setProperty("--accent", t.accent || "#c8362a");
  }, [t.mode, t.accent]);

  // Apply scale via root font size
  useEffect(() => {
    document.documentElement.style.fontSize = (t.scale || 100) / 100 * 16 + "px";
  }, [t.scale]);

  const onNav = (r) => {
    setRoute(r);
    location.hash = "/" + r;
    window.scrollTo({ top: 0, behavior: "instant" });
  };

  useEffect(() => {
    const onHash = () => {
      const h = (location.hash || "").replace("#/", "").replace("#", "");
      const valid = ["home", "menu", "gallery", "about", "contact", "funding"];
      if (valid.includes(h)) setRoute(h);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const PageComp = {
    home: HomePage,
    menu: MenuPage,
    gallery: GalleryPage,
    about: AboutPage,
    contact: ContactPage,
    funding: FundingPage
  }[route];

  return (
    <div className="app">
      <NavBar route={route} onNav={onNav} />
      <PageComp onNav={onNav} t={t} />
      <Footer onNav={onNav} />

      <TweaksPanel>
        <TweakSection label="Hangulat" />
        <TweakRadio
          label="Stílus"
          value={t.mode}
          options={[
          { value: "minimal", label: "Minimál" },
          { value: "editorial", label: "Editorial" },
          { value: "bold", label: "Bold" }]
          }
          onChange={(v) => setTweak("mode", v)} />
        
        <TweakColor
          label="Akcentus"
          value={t.accent}
          options={["#c8362a", "#1f6a3a", "#a37a2b", "#3c3c3c", "#7a2a1f"]}
          onChange={(v) => setTweak("accent", v)} />
        

        <TweakSection label="Tartalom" />
        <TweakToggle
          label="Vélemények szekció"
          value={t.showReviews}
          onChange={(v) => setTweak("showReviews", v)} />
        

        <TweakSection label="Tipográfia" />
        <TweakSlider
          label="Méret"
          value={t.scale}
          min={85} max={120} step={5} unit="%"
          onChange={(v) => setTweak("scale", v)} />
        

        <TweakSection label="Navigáció" />
        <TweakSelect
          label="Oldal"
          value={route}
          options={[
          { value: "home", label: "Kezdőlap" },
          { value: "menu", label: "Étlap" },
          { value: "gallery", label: "Galéria" },
          { value: "about", label: "Rólunk" },
          { value: "contact", label: "Kapcsolat" },
          { value: "funding", label: "Széchenyi Terv (rejtett)" }]
          }
          onChange={(v) => onNav(v)} />
        
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);  </script>
